<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../base.css">
    <link rel="stylesheet" href="lyrics.css">
    <link rel="icon" href="../../favicon.jpg" type="image/jpeg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyrics — Saturn World</title>
</head>
<body>
    <div class="background"></div>

    <div class="mobile-nav" id="mobileNav">
        <a href="../../index.html">home</a>
        <a href="music.html">music</a>
        <a href="../about/about.html">about</a>
        <a href="../shows/shows.html">shows (soon)</a>
        <a href="../linktree/linktree.html">linktree</a>
    </div>

    <nav class="topbar">
        <a class="topbar-left" href="../../index.html">saturn world</a>
        <div class="topbar-links">
            <a href="music.html">music</a>
            <a href="../about/about.html">about</a>
            <a href="../shows/shows.html">shows (soon)</a>
            <a href="../linktree/linktree.html">linktree</a>
        </div>
        <button class="menu-toggle" id="menuToggle" onclick="toggleMenu()" aria-label="menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <main class="page-content">
        <a href="music.html" class="back-link">← back to music</a>
        <h1 class="page-title" id="lyrics-title">—</h1>
        <p class="page-meta" id="lyrics-meta">lyrics</p>
        <div class="divider"></div>
        <pre class="lyrics-body" id="lyrics-body">loading...</pre>
    </main>

    <footer class="bottombar">
        <span>© 2026 zmiless. All rights reserved. — Built by zmiless himself</span>
        <div class="bottombar-links"><a href="#">shhh...</a></div>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('mobileNav').classList.toggle('open');
            document.getElementById('menuToggle').classList.toggle('open');
        }

        const params = new URLSearchParams(window.location.search);
        const song = params.get('song');
        if (song) {
            const display = song.replace(/-/g, ' ');
            document.getElementById('lyrics-title').textContent = display;
            document.title = display + ' — lyrics';
            fetch(`lyrics/${song}/lyrics.txt`)
                .then(r => { if (!r.ok) throw new Error(); return r.text(); })
                .then(text => { document.getElementById('lyrics-body').textContent = text; })
                .catch(() => { document.getElementById('lyrics-body').textContent = 'lyrics not found.\ncheck: lyrics/' + song + '/lyrics.txt'; });
        } else {
            document.getElementById('lyrics-title').textContent = 'Lyrics';
            document.getElementById('lyrics-body').textContent = 'select a song from the music page.';
        }
    </script>
</body>
</html>
